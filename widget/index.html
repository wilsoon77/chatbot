<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chatbot Widget Playground</title>
    <!-- Carga de Google Fonts Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      body {
        margin: 0;
        padding: 40px;
        font-family: 'Inter', sans-serif;
        background-color: #f3f4f6;
        color: #1f2937;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 80vh;
      }
      .card {
        background: white;
        padding: 40px;
        border-radius: 16px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        max-width: 600px;
        text-align: center;
        border: 1px solid rgba(0,0,0,0.05);
      }
      h1 {
        margin-top: 0;
        color: #111827;
        font-size: 24px;
        letter-spacing: -0.5px;
      }
      p {
        color: #4b5563;
        line-height: 1.6;
        font-size: 14px;
      }
      .badge {
        display: inline-block;
        background-color: #e0f2fe;
        color: #0369a1;
        padding: 4px 12px;
        border-radius: 20px;
        font-size: 11px;
        font-weight: 600;
        margin-bottom: 20px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <span class="badge">Playground Local</span>
      <h1>Simulación de Integración del Widget</h1>
      <p>
        Esta es una página de ejemplo para probar el chatbot de forma aislada. El widget de chat está incrustado mediante un Web Component encapsulado en un Shadow DOM, garantizando que el diseño sea totalmente inmune a los estilos externos.
      </p>
      
    </div>

    <!-- Integración del Web Component con script autoinyectable -->
    <!-- En desarrollo, apunta dinámicamente a src/main.tsx. En producción apuntará al CDN unificado. -->
    <script 
      type="module" 
      src="/src/main.tsx" 
      data-tenant="cmprh438b0002fgbkqslxem5t" 
      data-color="#10b981" 
      data-bot-name="Asistente de Compras"
    ></script>
  </body>
</html>
