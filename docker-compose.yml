  version: "3.9"

  services:
    postgres:
      image: postgres:17
      container_name: bot_postgres
      restart: always
      environment:
        POSTGRES_USER: botuser
        POSTGRES_PASSWORD: botpass
        POSTGRES_DB: botdb
      ports:
        - "5432:5432"
      volumes:
        - pgdata:/var/lib/postgresql/data

    redis:
      image: redis:7
      container_name: bot_redis
      restart: always
      ports:
        - "6379:6379"
      volumes:
        - redisdata:/data

  volumes:
    pgdata:
    redisdata: