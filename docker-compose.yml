services:
  postgres:
    image: postgres:17
    container_name: bot_postgres
    restart: "no"
    environment:
      POSTGRES_USER: botuser
      POSTGRES_PASSWORD: botpass
      POSTGRES_DB: botdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

    # 🔥 HEALTHCHECK (clave para production)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U botuser -d botdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    container_name: bot_redis
    restart: "no"
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  app:
    build: .
    image: chatbot-core-app:latest
    container_name: chatbot_app

    ports:
      - "3000:3000"

    env_file:
      - .env

    environment:
      DATABASE_URL: postgresql://botuser:botpass@postgres:5432/botdb?schema=public
      REDIS_URL: redis://redis:6379

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

    command: >
      sh -c "npx prisma migrate deploy && node dist/src/main.js"

  admin:
    build: ./admin
    container_name: chatbot_admin
    restart: "no"

    ports:
      - "5173:5173"

    environment:
      CHOKIDAR_USEPOLLING: "true"

    volumes:
      - ./admin:/app
      - /app/node_modules

    depends_on:
      - app

volumes:
  pgdata:
  redisdata:

networks:
  default:
    driver: bridge
    driver_opts:
      com.docker.network.driver.mtu: "1300"